<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clause Chunker Reader</title>
    <style>
        :root {
            --bg-color: #121212;
            --surface-color: #1e1e1e;
            --text-color: #e0e0e0;
            --word-bg: #333333;
            --clause-bg: #4a90e2;
            --accent-color: #bb86fc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            height: 100vh;
        }

        #container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            height: 90%;
        }

        textarea {
            width: 100%;
            height: 150px;
            background: var(--surface-color);
            color: var(--text-color);
            border: 1px solid #444;
            border-radius: 8px;
            padding: 15px;
            font-size: 16px;
            resize: none;
        }

        #reader-area {
            flex-grow: 1;
            background: var(--surface-color);
            border-radius: 8px;
            padding: 20px;
            overflow-y: auto;
            line-height: 2.5;
            font-size: 20px;
        }

        .word {
            display: inline-block;
            margin: 2px 4px;
            padding: 2px 8px;
            background-color: var(--word-bg);
            border-radius: 4px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .word.chunked {
            background-color: var(--clause-bg);
            color: white;
            font-weight: bold;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        #btn-chunk {
            background-color: var(--accent-color);
            color: #000;
            flex-grow: 1;
        }

        #btn-process {
            background-color: #03dac6;
            color: #000;
        }

        button:hover {
            opacity: 0.9;
        }

        button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

<div id="container">
    <textarea id="input-text" placeholder="Paste your long text here..."></textarea>
    
    <div class="controls">
        <button id="btn-process">Start Reading</button>
    </div>

    <div id="reader-area">
        Your processed text will appear here. Click "Start Reading" to begin.
    </div>

    <div class="controls">
        <button id="btn-chunk">CHUNCK CLAUSE (Spacebar)</button>
    </div>
</div>

<script>
    const inputText = document.getElementById('input-text');
    const btnProcess = document.getElementById('btn-process');
    const btnChunk = document.getElementById('btn-chunk');
    const readerArea = document.getElementById('reader-area');

    let wordsArray = [];
    let currentIdx = 0;

    // Process text into individual word spans
    btnProcess.addEventListener('click', () => {
        const text = inputText.value.trim();
        if (!text) return;

        readerArea.innerHTML = '';
        wordsArray = text.split(/\s+/);
        currentIdx = 0;

        wordsArray.forEach((word, index) => {
            const span = document.createElement('span');
            span.textContent = word;
            span.classList.add('word');
            span.id = `word-${index}`;
            readerArea.appendChild(span);
        });
    });

    // Chunking Logic
    function markClause() {
        // We find the next word that isn't chunked yet
        const nextWord = document.getElementById(`word-${currentIdx}`);
        
        if (nextWord) {
            nextWord.classList.add('chunked');
            nextWord.scrollIntoView({ behavior: 'smooth', block: 'center' });
            currentIdx++;
        }
    }

    btnChunk.addEventListener('click', markClause);

    // Keyboard shortcut: Press Space to chunk
    window.addEventListener('keydown', (e) => {
        if (e.code === 'Space' && document.activeElement !== inputText) {
            e.preventDefault(); // Prevent page scrolling
            markClause();
        }
    });
</script>

</body>
</html>
