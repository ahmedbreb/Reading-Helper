<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clause Reader V22</title>
    <style>
        :root {
            --bg-color: #080808;
            --surface-color: #111;
            --btn-bg: #0f0f0f;
            --btn-border: #1a1a1a;
            --clause-a: #162e45; 
            --clause-b: #0a1a2b;
            --unread-color: rgb(40, 40, 40); 
            --active-text-color: rgb(150, 150, 150);
            --clause-text-color: rgb(255, 255, 255);
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: var(--bg-color);
            color: #fff; font-family: sans-serif;
            overflow: hidden;
        }

        .hidden { display: none !important; }

        #setup-page {
            display: flex; flex-direction: column;
            padding: 15px; height: 100dvh; box-sizing: border-box;
            max-width: 800px; margin: 0 auto;
        }

        .top-row { display: flex; justify-content: space-between; padding-bottom: 8px; }
        
        .top-btn { 
            background: #1a1a1a; border: 1px solid #333; color: #777; 
            padding: 8px 12px; border-radius: 6px; cursor: pointer; 
            font-size: 10px; text-transform: uppercase;
        }

        .settings-container {
            background: var(--surface-color);
            padding: 12px; border-radius: 8px; margin-bottom: 10px;
            display: flex; flex-direction: column; gap: 10px;
        }

        .setting-item {
            display: grid; grid-template-columns: 80px 1fr 45px;
            gap: 8px; align-items: center; color: #666; font-size: 10px;
            letter-spacing: 1px;
        }

        input[type=range] { cursor: pointer; accent-color: #555; width: 100%; margin: 0; }

        textarea {
            flex: 1; background: var(--surface-color); color: #888;
            border: 1px solid var(--btn-border); border-radius: 8px;
            padding: 15px; font-size: 18px; margin-bottom: 15px;
            outline: none; resize: none;
        }

        #start-btn {
            height: 60px; flex-shrink: 0;
            background: #111; color: #00ffaa;
            border: 1px solid #222; border-radius: 8px;
            font-size: 14px; cursor: pointer; letter-spacing: 3px;
            font-weight: bold; margin-bottom: 10px;
        }

        #reader-page { display: flex; flex-direction: column; height: 100dvh; position: relative; }

        #display-area {
            flex: 1; padding: 60px 25px; overflow-y: auto;
            line-height: 2.4; 
            /* Extra padding to clear the taller buttons */
            padding-bottom: 70vh; 
        }

        .paragraph { margin-bottom: 2em; display: block; }

        .word {
            display: inline; padding: 4px 0;
            color: var(--unread-color);
            white-space: pre-wrap; font-size: inherit;
        }

        .word.active { 
            background-color: #1a1a1a; 
            color: var(--active-text-color) !important; 
        }
        
        .word.clause-locked { color: var(--clause-text-color) !important; }
        
        .clause-v-a { background-color: var(--clause-a) !important; }
        .clause-v-b { background-color: var(--clause-b) !important; }

        .marker-start { padding-left: 10px !important; border-radius: 8px 0 0 8px; margin-left: 5px; }
        .marker-end { padding-right: 10px !important; border-radius: 0 8px 8px 0; margin-right: 35px; }

        /* UPDATED: 40% taller controls */
        .controls { 
            display: flex; 
            height: 49vh; 
            width: 100%; 
            background: var(--bg-color); 
            border-top: 1px solid #1a1a1a; 
        }

        .ctrl-btn {
            flex: 1; background: var(--btn-bg); border: none;
            color: #333; font-size: 14px; cursor: pointer; outline: none;
            -webkit-tap-highlight-color: transparent; letter-spacing: 5px; font-weight: bold;
        }

        #word-btn { border-right: 1px solid #1a1a1a; }

        #back-btn {
            position: absolute; top: 15px; left: 15px;
            background: rgba(0,0,0,0.8); border: 1px solid #222; color: #555;
            padding: 10px 18px; border-radius: 6px; font-size: 11px; z-index: 100;
        }
    </style>
</head>
<body>

    <div id="setup-page">
        <div class="top-row">
            <button class="top-btn" onclick="createNewSession()">NEW TEXT</button>
            <button id="clear-btn" class="top-btn" onclick="fullClear()">CLEAR ALL</button>
        </div>

        <div class="settings-container">
            <div class="setting-item">
                <label>SIZE</label>
                <input type="range" id="font-slider" min="16" max="44" value="22">
                <span id="font-value">22px</span>
            </div>
            <div class="setting-item">
                <label>UNREAD BR.</label>
                <input type="range" id="bright-slider" min="5" max="90" value="30">
                <span id="bright-value">30%</span>
            </div>
            <div class="setting-item">
                <label>ACTIVE BR.</label>
                <input type="range" id="active-bright-slider" min="10" max="100" value="60">
                <span id="active-bright-value">60%</span>
            </div>
            <div class="setting-item">
                <label>CLAUSE BR.</label>
                <input type="range" id="clause-bright-slider" min="10" max="100" value="100">
                <span id="clause-bright-value">100%</span>
            </div>
        </div>

        <textarea id="input-text" placeholder="Paste text..."></textarea>
        <button id="start-btn" onclick="resumeReader()">RESUME / OPEN READER</button>
    </div>

    <div id="reader-page" class="hidden">
        <button id="back-btn" onclick="goBack()">BACK</button>
        <div id="display-area"></div>
        <div class="controls">
            <button id="word-btn" class="ctrl-btn">WORD</button>
            <button id="clause-btn" class="ctrl-btn">CLAUSE</button>
        </div>
    </div>

<script>
    const PREFIX = "chunk_v22_";
    const setupPage = document.getElementById('setup-page');
    const readerPage = document.getElementById('reader-page');
    const inputText = document.getElementById('input-text');
    const displayArea = document.getElementById('display-area');
    
    let currentWordIdx = 0;
    let clauseCounter = 0;

    window.onload = () => {
        const savedHTML = localStorage.getItem(PREFIX + 'html');
        const savedIdx = localStorage.getItem(PREFIX + 'idx');
        const savedCount = localStorage.getItem(PREFIX + 'count');
        const savedFont = localStorage.getItem(PREFIX + 'font') || "22";
        const savedBright = localStorage.getItem(PREFIX + 'bright') || "30";
        const savedActiveBright = localStorage.getItem(PREFIX + 'activeBright') || "60";
        const savedClauseBright = localStorage.getItem(PREFIX + 'clauseBright') || "100";
        const savedRawText = localStorage.getItem(PREFIX + 'text');

        if (savedRawText) inputText.value = savedRawText;
        
        document.getElementById('font-slider').value = savedFont;
        document.getElementById('font-value').textContent = savedFont + "px";
        displayArea.style.fontSize = savedFont + "px";

        applyUnreadBrightness(savedBright);
        document.getElementById('bright-slider').value = savedBright;

        applyActiveBrightness(savedActiveBright);
        document.getElementById('active-bright-slider').value = savedActiveBright;

        applyClauseBrightness(savedClauseBright);
        document.getElementById('clause-bright-slider').value = savedClauseBright;

        if (savedHTML && savedHTML.trim() !== "") {
            displayArea.innerHTML = savedHTML;
            currentWordIdx = parseInt(savedIdx) || 0;
            clauseCounter = parseInt(savedCount) || 0;
        }
    };

    function applyUnreadBrightness(val) {
        document.getElementById('bright-value').textContent = val + "%";
        const c = Math.floor((val / 100) * 255);
        document.documentElement.style.setProperty('--unread-color', `rgb(${c}, ${c}, ${c})`);
        localStorage.setItem(PREFIX + 'bright', val);
    }

    function applyActiveBrightness(val) {
        document.getElementById('active-bright-value').textContent = val + "%";
        const c = Math.floor((val / 100) * 255);
        document.documentElement.style.setProperty('--active-text-color', `rgb(${c}, ${c}, ${c})`);
        localStorage.setItem(PREFIX + 'activeBright', val);
    }

    function applyClauseBrightness(val) {
        document.getElementById('clause-bright-value').textContent = val + "%";
        const c = Math.floor((val / 100) * 255);
        document.documentElement.style.setProperty('--clause-text-color', `rgb(${c}, ${c}, ${c})`);
        localStorage.setItem(PREFIX + 'clauseBright', val);
    }

    document.getElementById('bright-slider').oninput = function() { applyUnreadBrightness(this.value); };
    document.getElementById('active-bright-slider').oninput = function() { applyActiveBrightness(this.value); };
    document.getElementById('clause-bright-slider').oninput = function() { applyClauseBrightness(this.value); };
    document.getElementById('font-slider').oninput = function() {
        const val = this.value;
        document.getElementById('font-value').textContent = val + "px";
        displayArea.style.fontSize = val + "px";
        localStorage.setItem(PREFIX + 'font', val);
    };

    function createNewSession() {
        const text = inputText.value.trim();
        if (!text) return;
        if (displayArea.innerHTML !== "" && !confirm("Wipe current progress?")) return;
        const paragraphs = text.split(/\n+/);
        let globalIdx = 0;
        displayArea.innerHTML = paragraphs.map(p => {
            const words = p.split(/(\s+)/);
            return `<div class="paragraph">${words.map(w => `<span class="word" id="w-${globalIdx++}">${w}</span>`).join('')}</div>`;
        }).join('');
        currentWordIdx = 0;
        clauseCounter = 0;
        save();
    }

    function resumeReader() {
        if (displayArea.innerHTML === "") { createNewSession(); if (displayArea.innerHTML === "") return; }
        setupPage.classList.add('hidden');
        readerPage.classList.remove('hidden');
        save();
        scrollToActive();
    }

    function goBack() { save(); readerPage.classList.add('hidden'); setupPage.classList.remove('hidden'); }
    function fullClear() { if(confirm("Delete everything?")) { localStorage.clear(); location.reload(); } }

    function save() {
        localStorage.setItem(PREFIX + 'text', inputText.value);
        localStorage.setItem(PREFIX + 'html', displayArea.innerHTML);
        localStorage.setItem(PREFIX + 'idx', currentWordIdx);
        localStorage.setItem(PREFIX + 'count', clauseCounter);
    }

    function nextWord() {
        const el = document.getElementById(`w-${currentWordIdx}`);
        if (el) {
            el.classList.add('active');
            if (el.textContent.trim() === "") { currentWordIdx++; nextWord(); return; }
            scrollToActive();
            currentWordIdx++;
            save();
        }
    }

    function endClause() {
        const activeWords = Array.from(document.querySelectorAll('.word.active:not(.clause-locked)'));
        if (activeWords.length > 0) {
            const variant = (clauseCounter % 2 === 0) ? 'clause-v-a' : 'clause-v-b';
            activeWords.forEach((word, idx) => {
                word.classList.remove('active');
                word.classList.add('clause-locked', variant);
                const isFirst = (idx === 0) || (word.parentElement !== activeWords[idx-1]?.parentElement);
                const isLast = (idx === activeWords.length - 1) || (word.parentElement !== activeWords[idx+1]?.parentElement);
                if (isFirst) word.classList.add('marker-start');
                if (isLast) word.classList.add('marker-end');
            });
            clauseCounter++;
            save();
        }
    }

    function scrollToActive() {
        const el = document.getElementById(`w-${currentWordIdx}`);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    document.getElementById('word-btn').onclick = (e) => { e.preventDefault(); nextWord(); };
    document.getElementById('clause-btn').onclick = (e) => { e.preventDefault(); endClause(); };
</script>

</body>
</html>
