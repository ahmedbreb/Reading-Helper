<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clause Chunker Pro</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --surface-color: #1a1a1a;
            --text-dim: #666;
            --text-active: #ffffff;
            --word-highlight: #444; /* Gray background for active words */
            --clause-highlight: #2e5cb8; /* Distinct blue for finished clauses */
            --btn-word: #3d3d3d;
            --btn-clause: #bb86fc;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-active);
            font-family: sans-serif;
            overflow: hidden;
        }

        /* View Switching Logic */
        .hidden { display: none !important; }

        /* Setup Page */
        #setup-page {
            display: flex;
            flex-direction: column;
            padding: 20px;
            height: 100vh;
            box-sizing: border-box;
        }

        textarea {
            flex-grow: 1;
            background: var(--surface-color);
            color: white;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 20px;
            font-size: 18px;
            margin-bottom: 20px;
        }

        #start-btn {
            padding: 20px;
            background: var(--btn-clause);
            border: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 20px;
            cursor: pointer;
        }

        /* Reader Page */
        #reader-page {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        #display-area {
            flex: 1;
            padding: 40px 20px;
            overflow-y: auto;
            line-height: 1.8;
            font-size: 24px;
            text-align: left;
            padding-bottom: 50vh; /* Allow scrolling past text */
        }

        .word {
            display: inline-block;
            margin: 0 4px;
            padding: 2px 6px;
            border-radius: 4px;
            color: var(--text-dim);
            transition: background 0.1s;
        }

        /* Active: The "Word" button was pressed */
        .word.active {
            background-color: var(--word-highlight);
            color: white;
        }

        /* Clause: The "Clause" button was pressed */
        .word.clause-locked {
            background-color: var(--clause-highlight) !important;
            color: white !important;
            margin-right: 12px; /* Adds a visual break between clauses */
        }

        /* Controls Area */
        .controls {
            display: flex;
            height: 40vh;
            width: 100%;
            border-top: 2px solid #333;
        }

        .ctrl-btn {
            flex: 1;
            border: none;
            color: black;
            font-weight: bold;
            font-size: 24px;
            cursor: pointer;
            transition: opacity 0.1s;
        }

        #word-btn { background-color: #a0a0a0; border-right: 1px solid #000; }
        #clause-btn { background-color: var(--btn-clause); }

        .ctrl-btn:active { opacity: 0.7; }
    </style>
</head>
<body>

    <div id="setup-page">
        <h2 style="text-align: center;">Paste Your Text</h2>
        <textarea id="input-text" placeholder="Paste long text here..."></textarea>
        <button id="start-btn">GO TO READING MODE</button>
    </div>

    <div id="reader-page" class="hidden">
        <div id="display-area"></div>
        
        <div class="controls">
            <button id="word-btn" class="ctrl-btn">NEXT WORD<br>(Left / A)</button>
            <button id="clause-btn" class="ctrl-btn">END CLAUSE<br>(Right / D)</button>
        </div>
    </div>

<script>
    const setupPage = document.getElementById('setup-page');
    const readerPage = document.getElementById('reader-page');
    const inputText = document.getElementById('input-text');
    const startBtn = document.getElementById('start-btn');
    const displayArea = document.getElementById('display-area');
    
    const wordBtn = document.getElementById('word-btn');
    const clauseBtn = document.getElementById('clause-btn');

    let currentWordIdx = 0;

    startBtn.addEventListener('click', () => {
        const text = inputText.value.trim();
        if (!text) return;

        const words = text.split(/\s+/);
        displayArea.innerHTML = words.map((w, i) => `<span class="word" id="w-${i}">${w}</span>`).join('');
        
        setupPage.classList.add('hidden');
        readerPage.classList.remove('hidden');
        currentWordIdx = 0;
    });

    function nextWord() {
        const el = document.getElementById(`w-${currentWordIdx}`);
        if (el) {
            el.classList.add('active');
            el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            currentWordIdx++;
        }
    }

    function endClause() {
        // Find all "active" words that haven't been locked into a clause yet
        const activeWords = document.querySelectorAll('.word.active:not(.clause-locked)');
        activeWords.forEach(word => {
            word.classList.add('clause-locked');
        });
    }

    // Button Listeners
    wordBtn.addEventListener('mousedown', (e) => { e.preventDefault(); nextWord(); });
    clauseBtn.addEventListener('mousedown', (e) => { e.preventDefault(); endClause(); });

    // Keyboard Shortcuts for comfort
    window.addEventListener('keydown', (e) => {
        if (readerPage.classList.contains('hidden')) return;
        
        if (e.key === 'a' || e.key === 'ArrowLeft') nextWord();
        if (e.key === 'd' || e.key === 'ArrowRight') endClause();
    });
</script>

</body>
</html>
