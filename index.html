<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Clause Reader</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --surface-color: #151515;
            --text-dim: #444;
            --text-active: #ffffff;
            --word-highlight: #2a2a2a; /* Subtle gray for active words */
            --clause-highlight: #1a3a5a; /* Deep blue for solid clauses */
            --btn-bg: #1a1a1a;
            --btn-border: #333;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-active);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            overflow: hidden;
        }

        .hidden { display: none !important; }

        /* Setup Page */
        #setup-page {
            display: flex;
            flex-direction: column;
            padding: 20px;
            height: 100vh;
            box-sizing: border-box;
            justify-content: center;
            max-width: 800px;
            margin: 0 auto;
        }

        textarea {
            flex-grow: 0;
            height: 60%;
            background: var(--surface-color);
            color: white;
            border: 1px solid var(--btn-border);
            border-radius: 8px;
            padding: 20px;
            font-size: 18px;
            margin-bottom: 20px;
            outline: none;
        }

        #start-btn {
            padding: 15px;
            background: var(--btn-bg);
            color: #888;
            border: 1px solid var(--btn-border);
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
        }

        /* Reader Page */
        #reader-page {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        #display-area {
            flex: 1;
            padding: 60px 30px;
            overflow-y: auto;
            line-height: 2.2;
            font-size: 26px;
            padding-bottom: 50vh;
        }

        .word {
            display: inline; /* Changed to inline for seamless blocks */
            padding: 4px 0;
            color: var(--text-dim);
            transition: background 0.1s, color 0.1s;
            white-space: pre-wrap;
        }

        /* Active highlight for single words */
        .word.active {
            background-color: var(--word-highlight);
            color: #ccc;
        }

        /* Seamless Clause Highlight */
        .word.clause-locked {
            background-color: var(--clause-highlight) !important;
            color: white !important;
            padding-top: 6px;
            padding-bottom: 6px;
        }

        /* This removes gaps between highlighted words in the same clause */
        .word.clause-locked + .word.clause-locked {
            margin-left: 0;
        }

        /* Controls Area */
        .controls {
            display: flex;
            height: 35vh;
            width: 100%;
            background: var(--bg-color);
        }

        .ctrl-btn {
            flex: 1;
            background: var(--btn-bg);
            border: 1px solid var(--btn-border);
            color: #555; /* Dim, non-distracting text */
            font-size: 16px;
            cursor: pointer;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        .ctrl-btn:active {
            background: #222;
        }

        #word-btn { border-right: none; }
    </style>
</head>
<body>

    <div id="setup-page">
        <textarea id="input-text" placeholder="Paste text here..."></textarea>
        <button id="start-btn">Start Reading</button>
    </div>

    <div id="reader-page" class="hidden">
        <div id="display-area"></div>
        
        <div class="controls">
            <button id="word-btn" class="ctrl-btn">WORD</button>
            <button id="clause-btn" class="ctrl-btn">CLAUSE</button>
        </div>
    </div>

<script>
    const setupPage = document.getElementById('setup-page');
    const readerPage = document.getElementById('reader-page');
    const inputText = document.getElementById('input-text');
    const startBtn = document.getElementById('start-btn');
    const displayArea = document.getElementById('display-area');
    
    const wordBtn = document.getElementById('word-btn');
    const clauseBtn = document.getElementById('clause-btn');

    let currentWordIdx = 0;

    startBtn.addEventListener('click', () => {
        const text = inputText.value.trim();
        if (!text) return;

        // Split text but keep spaces to ensure the "solid block" look
        const words = text.split(/(\s+)/);
        displayArea.innerHTML = words.map((w, i) => {
            if (w.trim() === "") return `<span class="word space" id="w-${i}">${w}</span>`;
            return `<span class="word" id="w-${i}">${w}</span>`;
        }).join('');
        
        setupPage.classList.add('hidden');
        readerPage.classList.remove('hidden');
        currentWordIdx = 0;
    });

    function nextWord() {
        const el = document.getElementById(`w-${currentWordIdx}`);
        if (el) {
            el.classList.add('active');
            // If it's a space, auto-jump to the next actual word for speed
            if (el.classList.contains('space')) {
                currentWordIdx++;
                nextWord();
                return;
            }
            el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            currentWordIdx++;
        }
    }

    function endClause() {
        const activeWords = document.querySelectorAll('.word.active:not(.clause-locked)');
        activeWords.forEach(word => {
            word.classList.add('clause-locked');
            word.classList.remove('active');
        });
    }

    // Input events
    wordBtn.addEventListener('pointerdown', (e) => { e.preventDefault(); nextWord(); });
    clauseBtn.addEventListener('pointerdown', (e) => { e.preventDefault(); endClause(); });

    // Keyboard Shortcuts
    window.addEventListener('keydown', (e) => {
        if (readerPage.classList.contains('hidden')) return;
        if (e.key === 'a' || e.key === 'ArrowLeft') nextWord();
        if (e.key === 'd' || e.key === 'ArrowRight') endClause();
    });
</script>

</body>
</html>
