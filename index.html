<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alternating Clause Reader</title>
    <style>
        :root {
            --bg-color: #080808;
            --surface-color: #111;
            --text-dim: #444;
            --text-active: #ffffff;
            --word-highlight: #1a1a1a;
            
            /* Two variations of deep, faint blue for markers */
            --marker-a: #0e1a2b; 
            --marker-b: #1a1a2e;
            
            --btn-bg: #0f0f0f;
            --btn-border: #1a1a1a;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: var(--bg-color);
            color: var(--text-active);
            font-family: sans-serif;
            overflow: hidden;
        }

        .hidden { display: none !important; }

        #setup-page {
            display: flex; flex-direction: column;
            padding: 20px; height: 100vh; box-sizing: border-box;
            justify-content: center; max-width: 800px; margin: 0 auto;
        }

        textarea {
            height: 60%; background: var(--surface-color);
            color: white; border: 1px solid var(--btn-border);
            border-radius: 8px; padding: 20px; font-size: 18px;
            margin-bottom: 20px; outline: none;
        }

        #start-btn {
            padding: 15px; background: var(--btn-bg); color: #555;
            border: 1px solid var(--btn-border); border-radius: 8px;
            font-size: 16px; cursor: pointer;
        }

        #reader-page { display: flex; flex-direction: column; height: 100vh; }

        #display-area {
            flex: 1; padding: 40px 25px; overflow-y: auto;
            line-height: 2.6; 
            font-size: 22px; /* Slightly smaller as requested */
            padding-bottom: 50vh;
        }

        .word {
            display: inline-block;
            padding: 2px 0;
            color: var(--text-dim);
            white-space: pre;
            border-radius: 4px;
        }

        .word.active {
            background-color: var(--word-highlight);
            color: #bbb;
        }

        /* Locked words remain untouched (no background) but white text */
        .word.clause-locked {
            color: white !important;
            background: transparent;
        }

        /* Boundary Markers (The spaces before and after) */
        .marker-start {
            padding-left: 8px;
            margin-left: 10px; /* Space before */
        }

        .marker-end {
            padding-right: 8px;
            margin-right: 25px; /* Space after / The Gap */
        }

        /* Variation A */
        .clause-v-a .marker-start, 
        .clause-v-a .marker-end {
            background-color: var(--marker-a) !important;
        }

        /* Variation B */
        .clause-v-b .marker-start, 
        .clause-v-b .marker-end {
            background-color: var(--marker-b) !important;
        }

        .controls { display: flex; height: 35vh; width: 100%; background: var(--bg-color); }

        .ctrl-btn {
            flex: 1; background: var(--btn-bg); border: 1px solid var(--btn-border);
            color: #333; font-size: 12px; cursor: pointer; outline: none;
            -webkit-tap-highlight-color: transparent;
            letter-spacing: 3px;
        }

        #reset-progress {
            position: absolute; top: 15px; right: 15px;
            background: none; border: 1px solid #1a1a1a; color: #222;
            padding: 8px 12px; border-radius: 6px; font-size: 11px;
        }
    </style>
</head>
<body>

    <div id="setup-page">
        <textarea id="input-text" placeholder="Paste your text..."></textarea>
        <button id="start-btn">READ</button>
    </div>

    <div id="reader-page" class="hidden">
        <button id="reset-progress">NEW</button>
        <div id="display-area"></div>
        <div class="controls">
            <button id="word-btn" class="ctrl-btn">WORD</button>
            <button id="clause-btn" class="ctrl-btn">CLAUSE</button>
        </div>
    </div>

<script>
    const setupPage = document.getElementById('setup-page');
    const readerPage = document.getElementById('reader-page');
    const inputText = document.getElementById('input-text');
    const startBtn = document.getElementById('start-btn');
    const displayArea = document.getElementById('display-area');
    const resetBtn = document.getElementById('reset-progress');
    const wordBtn = document.getElementById('word-btn');
    const clauseBtn = document.getElementById('clause-btn');

    let currentWordIdx = 0;
    let clauseCounter = 0;

    window.onload = () => {
        const savedHTML = localStorage.getItem('v6_html');
        const savedIdx = localStorage.getItem('v6_idx');
        const savedCount = localStorage.getItem('v6_count');
        if (savedHTML) {
            displayArea.innerHTML = savedHTML;
            currentWordIdx = parseInt(savedIdx) || 0;
            clauseCounter = parseInt(savedCount) || 0;
            setupPage.classList.add('hidden');
            readerPage.classList.remove('hidden');
            scrollToActive();
        }
    };

    function save() {
        localStorage.setItem('v6_html', displayArea.innerHTML);
        localStorage.setItem('v6_idx', currentWordIdx);
        localStorage.setItem('v6_count', clauseCounter);
    }

    startBtn.addEventListener('click', () => {
        const text = inputText.value.trim();
        if (!text) return;
        const words = text.split(/(\s+)/);
        displayArea.innerHTML = words.map((w, i) => `<span class="word" id="w-${i}">${w}</span>`).join('');
        setupPage.classList.add('hidden');
        readerPage.classList.remove('hidden');
        currentWordIdx = 0;
        clauseCounter = 0;
        save();
    });

    function nextWord() {
        const el = document.getElementById(`w-${currentWordIdx}`);
        if (el) {
            el.classList.add('active');
            if (el.textContent.trim() === "") {
                currentWordIdx++;
                nextWord();
                return;
            }
            scrollToActive();
            currentWordIdx++;
            save();
        }
    }

    function endClause() {
        const activeWords = Array.from(document.querySelectorAll('.word.active:not(.clause-locked)'));
        if (activeWords.length > 0) {
            // Determine variation A or B
            const variationClass = (clauseCounter % 2 === 0) ? 'clause-v-a' : 'clause-v-b';
            
            activeWords.forEach((word, idx) => {
                word.classList.add('clause-locked');
                word.classList.add(variationClass); // Assign variation to the whole group
                word.classList.remove('active');
                
                // Add marker classes to the start and end words
                if (idx === 0) word.classList.add('marker-start');
                if (idx === activeWords.length - 1) word.classList.add('marker-end');
            });
            
            clauseCounter++;
            save();
        }
    }

    function scrollToActive() {
        const el = document.getElementById(`w-${currentWordIdx}`);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    resetBtn.addEventListener('click', () => {
        localStorage.clear();
        location.reload();
    });

    wordBtn.addEventListener('pointerdown', (e) => { e.preventDefault(); nextWord(); });
    clauseBtn.addEventListener('pointerdown', (e) => { e.preventDefault(); endClause(); });

    window.addEventListener('keydown', (e) => {
        if (readerPage.classList.contains('hidden')) return;
        if (e.key === 'a' || e.key === 'ArrowLeft') nextWord();
        if (e.key === 'd' || e.key === 'ArrowRight') endClause();
    });
</script>

</body>
</html>
