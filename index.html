<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixed Clause Reader</title>
    <style>
        :root {
            --bg-color: #080808;
            --surface-color: #111;
            --text-dim: #444;
            --text-active: #ffffff;
            --word-highlight: #222;
            --clause-a: #162e45; 
            --clause-b: #0a1a2b;
            --btn-bg: #0f0f0f;
            --btn-border: #1a1a1a;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: var(--bg-color);
            color: var(--text-active);
            font-family: sans-serif;
            overflow: hidden;
        }

        .hidden { display: none !important; }

        #setup-page {
            display: flex; flex-direction: column;
            padding: 20px; height: 100vh; box-sizing: border-box;
            justify-content: center; max-width: 800px; margin: 0 auto;
        }

        .settings-bar {
            background: var(--surface-color);
            padding: 15px; border-radius: 8px; margin-bottom: 15px;
            display: flex; align-items: center; gap: 15px;
            color: #888; font-size: 14px;
        }

        input[type=range] { flex-grow: 1; }

        textarea {
            height: 50%; background: var(--surface-color);
            color: white; border: 1px solid var(--btn-border);
            border-radius: 8px; padding: 20px; font-size: 18px;
            margin-bottom: 20px; outline: none; resize: none;
        }

        #start-btn {
            padding: 15px; background: var(--btn-bg); color: #888;
            border: 1px solid var(--btn-border); border-radius: 8px;
            font-size: 16px; cursor: pointer;
        }

        #reader-page { display: flex; flex-direction: column; height: 100vh; }

        #display-area {
            flex: 1; padding: 40px 25px; overflow-y: auto;
            line-height: 1.8; /* Adjusted for better flow */
            padding-bottom: 50vh;
        }

        /* Essential Fix: Using inline to prevent the "staircase" effect seen in your screenshot */
        .word {
            display: inline; 
            padding: 2px 0;
            color: var(--text-dim);
            white-space: pre-wrap; /* Allows natural wrapping */
            font-size: inherit;
        }

        .word.active { background-color: var(--word-highlight); color: #bbb; }
        
        .word.clause-locked { 
            color: white !important;
            padding: 4px 0;
        }

        /* Alternating Colors */
        .clause-v-a { background-color: var(--clause-a) !important; }
        .clause-v-b { background-color: var(--clause-b) !important; }

        /* The "Markers" - Using border-radius on the ends only */
        .marker-start {
            padding-left: 10px !important;
            border-top-left-radius: 8px;
            border-bottom-left-radius: 8px;
            margin-left: 8px;
        }

        .marker-end {
            padding-right: 10px !important;
            border-top-right-radius: 8px;
            border-bottom-right-radius: 8px;
            margin-right: 30px; /* The physical gap between clauses */
        }

        .controls { display: flex; height: 35vh; width: 100%; background: var(--bg-color); border-top: 1px solid #1a1a1a; }

        .ctrl-btn {
            flex: 1; background: var(--btn-bg); border: none;
            color: #2a2a2a; font-size: 11px; cursor: pointer; outline: none;
            -webkit-tap-highlight-color: transparent;
            letter-spacing: 4px; font-weight: bold;
        }

        #word-btn { border-right: 1px solid #1a1a1a; }

        #reset-progress {
            position: absolute; top: 15px; right: 15px;
            background: rgba(0,0,0,0.5); border: 1px solid #1a1a1a; color: #333;
            padding: 6px 10px; border-radius: 4px; font-size: 10px; z-index: 10;
        }
    </style>
</head>
<body>

    <div id="setup-page">
        <div class="settings-bar">
            <label>Size:</label>
            <input type="range" id="font-slider" min="16" max="40" value="22">
            <span id="font-value">22px</span>
        </div>
        <textarea id="input-text" placeholder="Paste your text..."></textarea>
        <button id="start-btn">START</button>
    </div>

    <div id="reader-page" class="hidden">
        <button id="reset-progress">NEW TEXT</button>
        <div id="display-area"></div>
        <div class="controls">
            <button id="word-btn" class="ctrl-btn">WORD</button>
            <button id="clause-btn" class="ctrl-btn">CLAUSE</button>
        </div>
    </div>

<script>
    const setupPage = document.getElementById('setup-page');
    const readerPage = document.getElementById('reader-page');
    const inputText = document.getElementById('input-text');
    const startBtn = document.getElementById('start-btn');
    const displayArea = document.getElementById('display-area');
    const resetBtn = document.getElementById('reset-progress');
    const wordBtn = document.getElementById('word-btn');
    const clauseBtn = document.getElementById('clause-btn');
    const fontSlider = document.getElementById('font-slider');
    const fontValue = document.getElementById('font-value');

    let currentWordIdx = 0;
    let clauseCounter = 0;

    window.onload = () => {
        const savedHTML = localStorage.getItem('v9_html');
        const savedIdx = localStorage.getItem('v9_idx');
        const savedCount = localStorage.getItem('v9_count');
        const savedFont = localStorage.getItem('v9_font');

        if (savedFont) {
            fontSlider.value = savedFont;
            fontValue.textContent = savedFont + "px";
            displayArea.style.fontSize = savedFont + "px";
        }

        if (savedHTML) {
            displayArea.innerHTML = savedHTML;
            currentWordIdx = parseInt(savedIdx) || 0;
            clauseCounter = parseInt(savedCount) || 0;
            setupPage.classList.add('hidden');
            readerPage.classList.remove('hidden');
            scrollToActive();
        }
    };

    fontSlider.addEventListener('input', () => {
        fontValue.textContent = fontSlider.value + "px";
        displayArea.style.fontSize = fontSlider.value + "px";
        localStorage.setItem('v9_font', fontSlider.value);
    });

    function save() {
        localStorage.setItem('v9_html', displayArea.innerHTML);
        localStorage.setItem('v9_idx', currentWordIdx);
        localStorage.setItem('v9_count', clauseCounter);
    }

    startBtn.addEventListener('click', () => {
        const text = inputText.value.trim();
        if (!text) return;
        // Split by words but preserve all whitespace correctly
        const words = text.split(/(\s+)/);
        displayArea.innerHTML = words.map((w, i) => `<span class="word" id="w-${i}">${w}</span>`).join('');
        setupPage.classList.add('hidden');
        readerPage.classList.remove('hidden');
        currentWordIdx = 0;
        clauseCounter = 0;
        save();
    });

    function nextWord() {
        const el = document.getElementById(`w-${currentWordIdx}`);
        if (el) {
            el.classList.add('active');
            if (el.textContent.trim() === "") {
                currentWordIdx++;
                nextWord();
                return;
            }
            scrollToActive();
            currentWordIdx++;
            save();
        }
    }

    function endClause() {
        const activeWords = Array.from(document.querySelectorAll('.word.active:not(.clause-locked)'));
        if (activeWords.length > 0) {
            const variationClass = (clauseCounter % 2 === 0) ? 'clause-v-a' : 'clause-v-b';
            activeWords.forEach((word, idx) => {
                word.classList.remove('active');
                word.classList.add('clause-locked', variationClass);
                if (idx === 0) word.classList.add('marker-start');
                if (idx === activeWords.length - 1) word.classList.add('marker-end');
            });
            clauseCounter++;
            save();
        }
    }

    function scrollToActive() {
        const el = document.getElementById(`w-${currentWordIdx}`);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    resetBtn.addEventListener('click', () => {
        localStorage.clear();
        location.reload();
    });

    wordBtn.addEventListener('pointerdown', (e) => { e.preventDefault(); nextWord(); });
    clauseBtn.addEventListener('pointerdown', (e) => { e.preventDefault(); endClause(); });

    window.addEventListener('keydown', (e) => {
        if (readerPage.classList.contains('hidden')) return;
        if (e.key === 'a' || e.key === 'ArrowLeft') nextWord();
        if (e.key === 'd' || e.key === 'ArrowRight') endClause();
    });
</script>

</body>
</html>
