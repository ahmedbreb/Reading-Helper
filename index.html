<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clause Reader V13</title>
    <style>
        :root {
            --bg-color: #080808;
            --surface-color: #111;
            --text-dim: #252525; 
            --word-highlight: #1a1a1a;
            --clause-a: #162e45; 
            --clause-b: #0a1a2b;
            --btn-bg: #0f0f0f;
            --btn-border: #1a1a1a;
            /* Default brightness */
            --reader-bright: rgb(255, 255, 255); 
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: var(--bg-color);
            color: #fff; font-family: sans-serif;
            overflow: hidden; touch-action: manipulation;
        }

        .hidden { display: none !important; }

        /* Setup Page */
        #setup-page {
            display: flex; flex-direction: column;
            padding: 20px; height: 100vh; box-sizing: border-box;
            justify-content: center; max-width: 800px; margin: 0 auto;
        }

        .top-row { display: flex; justify-content: flex-end; margin-bottom: 10px; }
        #clear-btn { background: none; border: 1px solid #222; color: #444; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-size: 11px; }

        .settings-bar {
            background: var(--surface-color);
            padding: 15px; border-radius: 8px; margin-bottom: 15px;
            display: grid; grid-template-columns: auto 1fr auto;
            gap: 12px; align-items: center; color: #555; font-size: 12px;
        }

        input[type=range] { cursor: pointer; accent-color: #444; width: 100%; }

        textarea {
            flex: 1; background: var(--surface-color); color: #888;
            border: 1px solid var(--btn-border); border-radius: 8px;
            padding: 20px; font-size: 18px; margin-bottom: 20px;
            outline: none; resize: none;
        }

        #start-btn {
            padding: 20px; background: var(--btn-bg); color: #888;
            border: 1px solid var(--btn-border); border-radius: 8px;
            font-size: 16px; cursor: pointer; letter-spacing: 2px;
        }

        /* Reader Page */
        #reader-page { display: flex; flex-direction: column; height: 100vh; position: relative; }

        #display-area {
            flex: 1; padding: 60px 25px; overflow-y: auto;
            line-height: 2.2; padding-bottom: 60vh;
        }

        .paragraph { margin-bottom: 1.8em; display: block; }

        .word {
            display: inline; padding: 4px 0;
            color: var(--text-dim);
            white-space: pre-wrap; font-size: inherit;
            box-decoration-break: clone; -webkit-box-decoration-break: clone;
        }

        .word.active { background-color: var(--word-highlight); color: #555; }
        
        /* Brightness applies to locked text */
        .word.clause-locked { color: var(--reader-bright) !important; }

        .clause-v-a { background-color: var(--clause-a) !important; }
        .clause-v-b { background-color: var(--clause-b) !important; }

        .marker-start {
            padding-left: 10px !important; border-top-left-radius: 8px;
            border-bottom-left-radius: 8px; margin-left: 5px;
        }

        .marker-end {
            padding-right: 10px !important; border-top-right-radius: 8px;
            border-bottom-right-radius: 8px; margin-right: 35px; 
        }

        .controls { display: flex; height: 35vh; width: 100%; background: var(--bg-color); border-top: 1px solid #1a1a1a; }

        .ctrl-btn {
            flex: 1; background: var(--btn-bg); border: none;
            color: #222; font-size: 12px; cursor: pointer; outline: none;
            -webkit-tap-highlight-color: transparent; letter-spacing: 5px; font-weight: bold;
        }

        #word-btn { border-right: 1px solid #1a1a1a; }

        #back-btn {
            position: absolute; top: 15px; left: 15px;
            background: rgba(0,0,0,0.6); border: 1px solid #222; color: #555;
            padding: 8px 16px; border-radius: 6px; font-size: 11px; z-index: 100;
        }
    </style>
</head>
<body>

    <div id="setup-page">
        <div class="top-row">
            <button id="clear-btn">CLEAR ALL</button>
        </div>
        <div class="settings-bar">
            <label>SIZE</label>
            <input type="range" id="font-slider" min="16" max="44" value="22">
            <span id="font-value">22px</span>

            <label>BRIGHT</label>
            <input type="range" id="bright-slider" min="20" max="100" value="100">
            <span id="bright-value">100%</span>
        </div>
        <textarea id="input-text" placeholder="Paste your text..."></textarea>
        <button id="start-btn">OPEN READER</button>
    </div>

    <div id="reader-page" class="hidden">
        <button id="back-btn">BACK</button>
        <div id="display-area"></div>
        <div class="controls">
            <button id="word-btn" class="ctrl-btn">WORD</button>
            <button id="clause-btn" class="ctrl-btn">CLAUSE</button>
        </div>
    </div>

<script>
    const setupPage = document.getElementById('setup-page');
    const readerPage = document.getElementById('reader-page');
    const inputText = document.getElementById('input-text');
    const startBtn = document.getElementById('start-btn');
    const clearBtn = document.getElementById('clear-btn');
    const backBtn = document.getElementById('back-btn');
    const displayArea = document.getElementById('display-area');
    
    const fontSlider = document.getElementById('font-slider');
    const fontValue = document.getElementById('font-value');
    const brightSlider = document.getElementById('bright-slider');
    const brightValue = document.getElementById('bright-value');

    let currentWordIdx = 0;
    let clauseCounter = 0;

    window.onload = () => {
        const savedText = localStorage.getItem('v13_text');
        const savedHTML = localStorage.getItem('v13_html');
        const savedIdx = localStorage.getItem('v13_idx');
        const savedCount = localStorage.getItem('v13_count');
        const savedFont = localStorage.getItem('v13_font');
        const savedBright = localStorage.getItem('v13_bright');

        if (savedText) inputText.value = savedText;
        if (savedFont) {
            fontSlider.value = savedFont;
            fontValue.textContent = savedFont + "px";
            displayArea.style.fontSize = savedFont + "px";
        }
        if (savedBright) {
            brightSlider.value = savedBright;
            updateBrightness(savedBright);
        }
        if (savedHTML) {
            displayArea.innerHTML = savedHTML;
            currentWordIdx = parseInt(savedIdx) || 0;
            clauseCounter = parseInt(savedCount) || 0;
            setupPage.classList.add('hidden');
            readerPage.classList.remove('hidden');
            scrollToActive();
        }
    };

    function updateBrightness(val) {
        brightValue.textContent = val + "%";
        const c = Math.floor((val / 100) * 255);
        document.documentElement.style.setProperty('--reader-bright', `rgb(${c}, ${c}, ${c})`);
        localStorage.setItem('v13_bright', val);
    }

    brightSlider.addEventListener('input', (e) => updateBrightness(e.target.value));
    fontSlider.addEventListener('input', () => {
        fontValue.textContent = fontSlider.value + "px";
        displayArea.style.fontSize = fontSlider.value + "px";
        localStorage.setItem('v13_font', fontSlider.value);
    });

    function save() {
        localStorage.setItem('v13_text', inputText.value);
        localStorage.setItem('v13_html', displayArea.innerHTML);
        localStorage.setItem('v13_idx', currentWordIdx);
        localStorage.setItem('v13_count', clauseCounter);
    }

    startBtn.addEventListener('click', () => {
        const text = inputText.value.trim();
        if (!text) return;
        
        // Always refresh the HTML if we are entering from the setup page
        // to ensure word IDs match the current state.
        if (text !== localStorage.getItem('v13_text') || !displayArea.innerHTML) {
            const paragraphs = text.split(/\n+/);
            let globalWordIdx = 0;
            displayArea.innerHTML = paragraphs.map((p) => {
                const words = p.split(/(\s+)/);
                return `<div class="paragraph">${words.map(w => `<span class="word" id="w-${globalWordIdx++}">${w}</span>`).join('')}</div>`;
            }).join('');
            currentWordIdx = 0;
            clauseCounter = 0;
        }

        setupPage.classList.add('hidden');
        readerPage.classList.remove('hidden');
        save();
        scrollToActive();
    });

    backBtn.addEventListener('click', () => {
        readerPage.classList.add('hidden');
        setupPage.classList.remove('hidden');
    });

    clearBtn.addEventListener('click', () => {
        if(confirm("Clear everything?")) {
            localStorage.clear();
            inputText.value = "";
            displayArea.innerHTML = "";
            location.reload();
        }
    });

    function nextWord() {
        const el = document.getElementById(`w-${currentWordIdx}`);
        if (el) {
            el.classList.add('active');
            if (el.textContent.trim() === "") {
                currentWordIdx++;
                nextWord(); // Skip whitespace
                return;
            }
            scrollToActive();
            currentWordIdx++;
            save();
        }
    }

    function endClause() {
        const activeWords = Array.from(document.querySelectorAll('.word.active:not(.clause-locked)'));
        if (activeWords.length > 0) {
            const variant = (clauseCounter % 2 === 0) ? 'clause-v-a' : 'clause-v-b';
            activeWords.forEach((word, idx) => {
                word.classList.remove('active');
                word.classList.add('clause-locked', variant);
                const isFirst = (idx === 0) || (word.parentElement !== activeWords[idx-1]?.parentElement);
                const isLast = (idx === activeWords.length - 1) || (word.parentElement !== activeWords[idx+1]?.parentElement);
                if (isFirst) word.classList.add('marker-start');
                if (isLast) word.classList.add('marker-end');
            });
            clauseCounter++;
            save();
        }
    }

    function scrollToActive() {
        const el = document.getElementById(`w-${currentWordIdx}`);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    // Touch support for mobile buttons
    wordBtn.addEventListener('touchstart', (e) => { e.preventDefault(); nextWord(); });
    clauseBtn.addEventListener('touchstart', (e) => { e.preventDefault(); endClause(); });
    // Fallback for desktop/mouse
    wordBtn.addEventListener('mousedown', (e) => { if (e.button === 0) nextWord(); });
    clauseBtn.addEventListener('mousedown', (e) => { if (e.button === 0) endClause(); });

    window.addEventListener('keydown', (e) => {
        if (readerPage.classList.contains('hidden')) return;
        if (e.key === 'a' || e.key === 'ArrowLeft') nextWord();
        if (e.key === 'd' || e.key === 'ArrowRight') endClause();
    });
</script>

</body>
</html>
