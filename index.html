<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distinct Clause Reader</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --surface-color: #151515;
            --text-dim: #444;
            --text-active: #ffffff;
            --word-highlight: #2a2a2a;
            --clause-highlight: #1a3a5a; 
            /* New boundary colors */
            --clause-start: #162e45; /* Slightly different shade for the start */
            --clause-end: #224a73;   /* Slightly brighter shade for the end */
            --btn-bg: #141414;
            --btn-border: #252525;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: var(--bg-color);
            color: var(--text-active);
            font-family: sans-serif;
            overflow: hidden;
        }

        .hidden { display: none !important; }

        #setup-page {
            display: flex; flex-direction: column;
            padding: 20px; height: 100vh; box-sizing: border-box;
            justify-content: center; max-width: 800px; margin: 0 auto;
        }

        textarea {
            height: 60%; background: var(--surface-color);
            color: white; border: 1px solid var(--btn-border);
            border-radius: 8px; padding: 20px; font-size: 18px;
            margin-bottom: 20px; outline: none;
        }

        #start-btn {
            padding: 15px; background: var(--btn-bg); color: #666;
            border: 1px solid var(--btn-border); border-radius: 8px;
            font-size: 18px; cursor: pointer;
        }

        #reader-page { display: flex; flex-direction: column; height: 100vh; }

        #display-area {
            flex: 1; padding: 60px 30px; overflow-y: auto;
            line-height: 2.8; font-size: 26px; padding-bottom: 50vh;
        }

        .word {
            display: inline-block;
            padding: 2px 0;
            color: var(--text-dim);
            white-space: pre;
        }

        .word.active {
            background-color: var(--word-highlight);
            color: #ccc;
        }

        /* Base Clause Style */
        .word.clause-locked {
            background-color: var(--clause-highlight);
            color: white !important;
        }

        /* START of Clause: Faintly different color + rounded left */
        .word.clause-anchor-start {
            background-color: var(--clause-start) !important;
            border-top-left-radius: 8px;
            border-bottom-left-radius: 8px;
            padding-left: 8px;
        }

        /* END of Clause: Faintly different color + rounded right + Gap */
        .word.clause-anchor-end {
            background-color: var(--clause-end) !important;
            border-top-right-radius: 8px;
            border-bottom-right-radius: 8px;
            padding-right: 8px;
            margin-right: 30px; /* The physical gap */
        }

        .controls { display: flex; height: 35vh; width: 100%; background: var(--bg-color); }

        .ctrl-btn {
            flex: 1; background: var(--btn-bg); border: 1px solid var(--btn-border);
            color: #444; font-size: 14px; cursor: pointer; outline: none;
            -webkit-tap-highlight-color: transparent;
            letter-spacing: 2px;
        }

        #reset-progress {
            position: absolute; top: 15px; right: 15px;
            background: none; border: 1px solid #222; color: #333;
            padding: 8px 12px; border-radius: 6px; font-size: 12px;
        }
    </style>
</head>
<body>

    <div id="setup-page">
        <textarea id="input-text" placeholder="Paste your text here..."></textarea>
        <button id="start-btn">BEGIN READING</button>
    </div>

    <div id="reader-page" class="hidden">
        <button id="reset-progress">NEW TEXT</button>
        <div id="display-area"></div>
        <div class="controls">
            <button id="word-btn" class="ctrl-btn">WORD</button>
            <button id="clause-btn" class="ctrl-btn">CLAUSE</button>
        </div>
    </div>

<script>
    const setupPage = document.getElementById('setup-page');
    const readerPage = document.getElementById('reader-page');
    const inputText = document.getElementById('input-text');
    const startBtn = document.getElementById('start-btn');
    const displayArea = document.getElementById('display-area');
    const resetBtn = document.getElementById('reset-progress');
    const wordBtn = document.getElementById('word-btn');
    const clauseBtn = document.getElementById('clause-btn');

    let currentWordIdx = 0;

    window.onload = () => {
        const savedHTML = localStorage.getItem('v5_chunker_html');
        const savedIdx = localStorage.getItem('v5_chunker_index');
        if (savedHTML) {
            displayArea.innerHTML = savedHTML;
            currentWordIdx = parseInt(savedIdx) || 0;
            setupPage.classList.add('hidden');
            readerPage.classList.remove('hidden');
            scrollToActive();
        }
    };

    function save() {
        localStorage.setItem('v5_chunker_html', displayArea.innerHTML);
        localStorage.setItem('v5_chunker_index', currentWordIdx);
    }

    startBtn.addEventListener('click', () => {
        const text = inputText.value.trim();
        if (!text) return;
        const words = text.split(/(\s+)/);
        displayArea.innerHTML = words.map((w, i) => `<span class="word" id="w-${i}">${w}</span>`).join('');
        setupPage.classList.add('hidden');
        readerPage.classList.remove('hidden');
        currentWordIdx = 0;
        save();
    });

    function nextWord() {
        const el = document.getElementById(`w-${currentWordIdx}`);
        if (el) {
            el.classList.add('active');
            if (el.textContent.trim() === "") {
                currentWordIdx++;
                nextWord();
                return;
            }
            scrollToActive();
            currentWordIdx++;
            save();
        }
    }

    function endClause() {
        const activeWords = Array.from(document.querySelectorAll('.word.active:not(.clause-locked)'));
        if (activeWords.length > 0) {
            activeWords.forEach(word => {
                word.classList.add('clause-locked');
                word.classList.remove('active');
            });
            // Mark start and end with anchor classes
            activeWords[0].classList.add('clause-anchor-start');
            activeWords[activeWords.length - 1].classList.add('clause-anchor-end');
            save();
        }
    }

    function scrollToActive() {
        const el = document.getElementById(`w-${currentWordIdx}`);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    resetBtn.addEventListener('click', () => {
        localStorage.clear();
        location.reload();
    });

    wordBtn.addEventListener('pointerdown', (e) => { e.preventDefault(); nextWord(); });
    clauseBtn.addEventListener('pointerdown', (e) => { e.preventDefault(); endClause(); });

    window.addEventListener('keydown', (e) => {
        if (readerPage.classList.contains('hidden')) return;
        if (e.key === 'a' || e.key === 'ArrowLeft') nextWord();
        if (e.key === 'd' || e.key === 'ArrowRight') endClause();
    });
</script>

</body>
</html>
