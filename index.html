<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Persistent Clause Reader</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --surface-color: #151515;
            --text-dim: #444;
            --text-active: #ffffff;
            --word-highlight: #2a2a2a;
            --clause-highlight: #1a3a5a; 
            --btn-bg: #1a1a1a;
            --btn-border: #333;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: var(--bg-color);
            color: var(--text-active);
            font-family: sans-serif;
            overflow: hidden;
        }

        .hidden { display: none !important; }

        #setup-page {
            display: flex; flex-direction: column;
            padding: 20px; height: 100vh; box-sizing: border-box;
            justify-content: center; max-width: 800px; margin: 0 auto;
        }

        textarea {
            height: 60%; background: var(--surface-color);
            color: white; border: 1px solid var(--btn-border);
            border-radius: 8px; padding: 20px; font-size: 18px;
            margin-bottom: 20px; outline: none;
        }

        #start-btn {
            padding: 15px; background: var(--btn-bg); color: #888;
            border: 1px solid var(--btn-border); border-radius: 8px;
            font-size: 18px; cursor: pointer;
        }

        #reader-page { display: flex; flex-direction: column; height: 100vh; }

        #display-area {
            flex: 1; padding: 60px 30px; overflow-y: auto;
            line-height: 2.5; font-size: 26px; padding-bottom: 50vh;
        }

        .word {
            display: inline-block; /* Changed back to inline-block for gap support */
            padding: 4px 0;
            color: var(--text-dim);
            white-space: pre;
            transition: margin 0.2s;
        }

        .word.active {
            background-color: var(--word-highlight);
            color: #ccc;
        }

        .word.clause-locked {
            background-color: var(--clause-highlight) !important;
            color: white !important;
        }

        /* The Clause Gap: Adds space after the last word of a clause */
        .word.clause-end {
            margin-right: 25px; 
            border-top-right-radius: 6px;
            border-bottom-right-radius: 6px;
        }

        .controls { display: flex; height: 35vh; width: 100%; background: var(--bg-color); }

        .ctrl-btn {
            flex: 1; background: var(--btn-bg); border: 1px solid var(--btn-border);
            color: #555; font-size: 16px; cursor: pointer; outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        #reset-progress {
            position: absolute; top: 10px; right: 10px;
            background: none; border: 1px solid #333; color: #444;
            padding: 5px 10px; border-radius: 4px; font-size: 12px;
        }
    </style>
</head>
<body>

    <div id="setup-page">
        <textarea id="input-text" placeholder="Paste text here..."></textarea>
        <button id="start-btn">Start Reading</button>
    </div>

    <div id="reader-page" class="hidden">
        <button id="reset-progress">New Text</button>
        <div id="display-area"></div>
        <div class="controls">
            <button id="word-btn" class="ctrl-btn">WORD</button>
            <button id="clause-btn" class="ctrl-btn">CLAUSE GAP</button>
        </div>
    </div>

<script>
    const setupPage = document.getElementById('setup-page');
    const readerPage = document.getElementById('reader-page');
    const inputText = document.getElementById('input-text');
    const startBtn = document.getElementById('start-btn');
    const displayArea = document.getElementById('display-area');
    const resetBtn = document.getElementById('reset-progress');
    const wordBtn = document.getElementById('word-btn');
    const clauseBtn = document.getElementById('clause-btn');

    let currentWordIdx = 0;

    // Load saved data on startup
    window.onload = () => {
        const savedText = localStorage.getItem('chunker_text');
        const savedProgress = localStorage.getItem('chunker_index');
        const savedHTML = localStorage.getItem('chunker_html');

        if (savedText && savedHTML) {
            displayArea.innerHTML = savedHTML;
            currentWordIdx = parseInt(savedProgress) || 0;
            setupPage.classList.add('hidden');
            readerPage.classList.remove('hidden');
            scrollToActive();
        }
    };

    function saveState() {
        localStorage.setItem('chunker_text', inputText.value);
        localStorage.setItem('chunker_index', currentWordIdx);
        localStorage.setItem('chunker_html', displayArea.innerHTML);
    }

    startBtn.addEventListener('click', () => {
        const text = inputText.value.trim();
        if (!text) return;
        const words = text.split(/(\s+)/);
        displayArea.innerHTML = words.map((w, i) => `<span class="word" id="w-${i}">${w}</span>`).join('');
        setupPage.classList.add('hidden');
        readerPage.classList.remove('hidden');
        currentWordIdx = 0;
        saveState();
    });

    function nextWord() {
        const el = document.getElementById(`w-${currentWordIdx}`);
        if (el) {
            el.classList.add('active');
            if (el.textContent.trim() === "") {
                currentWordIdx++;
                nextWord();
                return;
            }
            scrollToActive();
            currentWordIdx++;
            saveState();
        }
    }

    function endClause() {
        const activeWords = document.querySelectorAll('.word.active:not(.clause-locked)');
        if (activeWords.length > 0) {
            activeWords.forEach(word => {
                word.classList.add('clause-locked');
                word.classList.remove('active');
            });
            // Mark the very last word of this group to create the gap
            activeWords[activeWords.length - 1].classList.add('clause-end');
            saveState();
        }
    }

    function scrollToActive() {
        const el = document.getElementById(`w-${currentWordIdx}`);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    resetBtn.addEventListener('click', () => {
        localStorage.clear();
        location.reload();
    });

    wordBtn.addEventListener('pointerdown', (e) => { e.preventDefault(); nextWord(); });
    clauseBtn.addEventListener('pointerdown', (e) => { e.preventDefault(); endClause(); });

    window.addEventListener('keydown', (e) => {
        if (readerPage.classList.contains('hidden')) return;
        if (e.key === 'a' || e.key === 'ArrowLeft') nextWord();
        if (e.key === 'd' || e.key === 'ArrowRight') endClause();
    });
</script>

</body>
</html>
